server.port=${ADMIN_SERVER_PORT:8082}
spring.application.name=admin-service
spring.profiles.active=prod
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jooq.sql-dialect=POSTGRES

spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}
# spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
# spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
# spring.data.redis.timeout=2000ms

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:false}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}

app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8081/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${HOSTNAME:localhost}

otp.expiry-minutes=3
otp.verified-expiry-minutes=1

app.email.super-admin=${SUPER_ADMIN_EMAIL:noreply@example.com}
registration.otp.ttl-minutes=5
registration.verified.ttl-minutes=3

storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.bucket=${STORAGE_BUCKET:rms-bucket}
storage.region=${STORAGE_REGION:us-east-1}
storage.use-ssl=${STORAGE_USE_SSL:false}
storage.presigned-expiry-minutes=${STORAGE_PRESIGNED_EXPIRY_MINUTES:5}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.currency=${STRIPE_CURRENCY:usd}

management.endpoints.web.exposure.include=health,info

logging.level.com.rms.admin=DEBUG

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
